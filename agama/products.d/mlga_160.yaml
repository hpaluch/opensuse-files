id: MLGA_Leap
name: MLGA Leap 16.0
# ------------------------------------------------------------------------------
# WARNING: When changing the product description delete the translations located
# at the at translations/description key below to avoid using obsolete
# translations!!
# ------------------------------------------------------------------------------
description: 'MLGA LEAP 16 v2 with Xfce/X11 and single BTRFS subvolume'
# Do not manually change any translations! See README.md for more details.
icon: Leap16.svg
translations:
  description:
    cs: MLGA LEAP 16 v2 s Xfce/X11 a pouze jednim BTRFS subvolumem
software:
  installation_repositories:
    - url: https://download.opensuse.org/distribution/leap/16.0/repo/oss/$basearch
  installation_labels:
    - label: Leap-DVD-x86_64
      archs: x86_64
    - label: Leap-DVD-aarch64
      archs: aarch64
    - label: Leap-DVD-s390x
      archs: s390
    - label: Leap-DVD-ppc64le
      archs: ppc
  mandatory_patterns:
    - enhanced_base # only pattern that is shared among all roles on Leap
  optional_patterns: null # no optional pattern shared
  user_patterns:
    - gnome
    - kde
    - xfce
    - xfce_wayland
    - multimedia
    - office
    - cockpit
    - fips
    - name: selinux
      selected: true
    - documentation
    - sw_management
    - container_runtime_podman
    - dhcp_dns_server
    - directory_server
    - file_server
    - gateway_server
    - kvm_server
    - kvm_tools
    - lamp_server
    - mail_server
    - printing
  mandatory_packages:
    - mc
    - tmux
    - git-lfs
    - NetworkManager
    - openSUSE-repos-Leap
    - sudo-policy-wheel-auth-self # explicit wheel group policy to conform new auth model
  optional_packages: null
  base_product: Leap

security:
  lsm: selinux
  available_lsms:
    apparmor:
      patterns:
        - apparmor
    selinux:
      patterns:
        - selinux
    none:
      patterns: null

storage:
  space_policy: delete
  volumes:
    - "/"
    - "swap"
  volume_templates:
    - mount_path: "/"
      filesystem: btrfs
      btrfs:
        snapshots: true
        read_only: false
        default_subvolume: "@leap16"
        subvolumes:
          - path: home
      size:
        auto: true
      outline:
        required: true
        filesystems:
          - btrfs
          - ext2
          - ext3
          - ext4
          - xfs
        auto_size:
          base_min: 5 GiB
          base_max: 15 GiB
          snapshots_increment: 150%
          max_fallback_for:
            - "/home"
        snapshots_configurable: true
    - mount_path: "swap"
      filesystem: swap
      size:
        min: 1 GiB
        max: 2 GiB
      outline:
        required: false
        filesystems:
          - swap
    - mount_path: "/home"
      filesystem: xfs
      size:
        auto: false
        min: 5 GiB
        max: unlimited
      outline:
        required: false
        filesystems:
          - btrfs
          - ext2
          - ext3
          - ext4
          - xfs
    - filesystem: xfs
      size:
        auto: false
        min: 512 MiB
      outline:
        required: false
        filesystems:
          - btrfs
          - ext2
          - ext3
          - ext4
          - xfs
          - vfat
